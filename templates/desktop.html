<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tsukuyomi OS Desktop</title>
  <style>
    :root {
      --bg: #070a0f;
      --panel: #0d1218;
      --panel-2: #111822;
      --panel-3: #182231;
      --accent: #00d4ff;
      --accent-2: #8b5cf6;
      --text: #e6f1f8;
      --muted: #8b9bb4;
      --border: #1c2733;
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #ef4444;
    }
    [data-theme="light"] {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-2: #eef1f4;
      --panel-3: #e2e7ec;
      --accent: #0066cc;
      --accent-2: #7c3aed;
      --text: #111827;
      --muted: #4b5563;
      --border: #d1d5db;
      --success: #059669;
      --warning: #d97706;
      --danger: #dc2626;
    }
    [data-theme="cyber"] {
      --bg: #050505;
      --panel: #0a0a0a;
      --panel-2: #141414;
      --panel-3: #1e1e1e;
      --accent: #39ff14;
      --accent-2: #ff00ff;
      --text: #e8ffcc;
      --muted: #6b8f55;
      --border: #223322;
      --success: #39ff14;
      --warning: #ffff00;
      --danger: #ff0033;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* Top bar */
    #topbar {
      height: 44px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 0.9rem;
      flex-shrink: 0;
      user-select: none;
    }
    #topbar .left, #topbar .right { display: flex; align-items: center; gap: 14px; }
    #topbar .os-name { font-weight: 700; color: var(--accent); letter-spacing: 0.5px; display:flex; align-items:center; gap:8px; }
    #topbar .pill {
      background: var(--panel-2);
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    #topbar button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 5px 10px;
      cursor: pointer;
    }
    #topbar button:hover { background: var(--panel-2); }
    /* Desktop */
    #desktop {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      grid-auto-rows: min-content;
      gap: 18px;
      padding: 28px;
      overflow-y: auto;
      align-content: start;
    }
    .app-tile {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 12px;
      text-align: center;
      cursor: pointer;
      transition: transform .12s, border-color .12s;
      user-select: none;
    }
    .app-tile:hover { transform: translateY(-3px); border-color: var(--accent); }
    .app-tile .icon { font-size: 36px; margin-bottom: 10px; display: block; }
    .app-tile .name { font-weight: 600; font-size: 0.95rem; }
    .app-tile .desc { color: var(--muted); font-size: 0.75rem; margin-top: 6px; line-height: 1.2; }
    /* Window */
    #window-layer {
      position: fixed;
      inset: 44px 0 0 0;
      display: none;
      flex-direction: column;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(4px);
      z-index: 10;
    }
    #window-layer.active { display: flex; }
    #window-titlebar {
      height: 42px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
    }
    #window-title { font-weight: 600; }
    #window-titlebar .controls { display: flex; gap: 8px; }
    #window-titlebar button {
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 4px 12px;
      cursor: pointer;
    }
    #window-frame { flex: 1; border: none; background: var(--bg); }
    #settings-panel, #placeholder-panel, #terminal-panel {
      flex: 1;
      display: none;
      padding: 28px;
      overflow-y: auto;
    }
    #terminal-panel {
      background: #000;
      color: #0f0;
      font-family: 'Consolas','Monaco',monospace;
      flex-direction: column;
      padding: 14px;
    }
    #terminal-output { flex: 1; overflow-y: auto; white-space: pre-wrap; font-size: 0.9rem; }
    #terminal-input-line { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    #terminal-prompt { color: var(--accent); }
    #terminal-input {
      flex: 1; background: transparent; border: none; color: #0f0; font: inherit; outline: none;
    }
    .settings-grid {
      max-width: 560px;
      display: grid;
      gap: 18px;
    }
    .setting-row {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .setting-row label { font-weight: 600; }
    .setting-row select, .setting-row input {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
    }
    .btn {
      background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 8px 14px; font-weight: 700; cursor: pointer;
    }
    .btn:hover { filter: brightness(1.1); }
    #placeholder-panel { align-items: center; justify-content: center; flex-direction: column; text-align: center; }
    #placeholder-panel h2 { margin: 0 0 8px; }
    #placeholder-panel p { color: var(--muted); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header id="topbar">
    <div class="left">
      <span class="os-name">🌙 Tsukuyomi OS</span>
      <span class="pill">User: <strong id="tb-username">{{ username }}</strong></span>
      <span class="pill">Role: <strong id="tb-role">—</strong></span>
    </div>
    <div class="right">
      <span class="pill" id="tb-date">—</span>
      <span class="pill" id="tb-time">—</span>
      <form method="POST" action="/logout" style="display:inline">
        <button type="submit">Logout</button>
      </form>
    </div>
  </header>

  <main id="desktop"></main>

  <div id="window-layer">
    <div id="window-titlebar">
      <span id="window-title">App</span>
      <div class="controls">
        <button id="btn-close">Close</button>
      </div>
    </div>
    <iframe id="window-frame"></iframe>
    <div id="settings-panel">
      <h2>Settings</h2>
      <div class="settings-grid">
        <div class="setting-row">
          <label for="s-theme">Theme</label>
          <select id="s-theme">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="cyber">Cyber</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="s-timezone">Timezone</label>
          <select id="s-timezone">
            <option value="America/Chicago">America/Chicago</option>
            <option value="America/New_York">America/New_York</option>
            <option value="America/Los_Angeles">America/Los_Angeles</option>
            <option value="UTC">UTC</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="s-lang">Language</label>
          <select id="s-lang">
            <option value="en">English</option>
            <option value="es">Spanish</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="s-notify">Notifications</label>
          <input type="checkbox" id="s-notify" checked>
        </div>
        <div class="setting-row" style="justify-content:flex-end">
          <button id="btn-save-settings" class="btn">Save Settings</button>
        </div>
      </div>
    </div>
    <div id="terminal-panel">
      <div id="terminal-output"></div>
      <div id="terminal-input-line">
        <span id="terminal-prompt">$</span>
        <input type="text" id="terminal-input" autocomplete="off" spellcheck="false">
      </div>
    </div>
    <div id="placeholder-panel">
      <h2 id="placeholder-title">App</h2>
      <p id="placeholder-desc">This app is a placeholder.</p>
    </div>
  </div>

  <script>
    const topBar = {
      username: document.getElementById('tb-username'),
      role: document.getElementById('tb-role'),
      date: document.getElementById('tb-date'),
      time: document.getElementById('tb-time'),
    };

    async function loadProfile() {
      const res = await fetch('/api/me');
      if (!res.ok) return location.href = '/';
      const data = await res.json();
      topBar.username.textContent = data.user.display_name || data.user.username;
      topBar.role.textContent = data.user.role;
      const settings = loadSettings();
      document.getElementById('s-theme').value = settings.theme;
      document.getElementById('s-timezone').value = settings.timezone;
      document.getElementById('s-lang').value = settings.language;
      document.getElementById('s-notify').checked = settings.notifications_enabled;
      applyTheme(settings.theme);
    }

    function loadSettings() {
      const defaults = { theme: 'dark', timezone: 'America/Chicago', language: 'en', notifications_enabled: true };
      try {
        const saved = JSON.parse(localStorage.getItem('tsukuyomi_settings') || '{}');
        return { ...defaults, ...saved };
      } catch {
        return defaults;
      }
    }

    function saveSettings() {
      const settings = {
        theme: document.getElementById('s-theme').value,
        timezone: document.getElementById('s-timezone').value,
        language: document.getElementById('s-lang').value,
        notifications_enabled: document.getElementById('s-notify').checked,
      };
      localStorage.setItem('tsukuyomi_settings', JSON.stringify(settings));
      applyTheme(settings.theme);
      updateClockTimezone(settings.timezone);
      return settings;
    }

    function updateClock() {
      const settings = loadSettings();
      const now = new Date();
      topBar.date.textContent = now.toLocaleDateString(settings.language || 'en', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', timeZone: settings.timezone });
      topBar.time.textContent = now.toLocaleTimeString(settings.language || 'en', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: settings.timezone });
    }

    function updateClockTimezone(timezone) {
      const settings = loadSettings();
      settings.timezone = timezone;
      updateClock();
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function loadApps() {
      const res = await fetch('/api/apps');
      if (!res.ok) return;
      const { apps } = await res.json();
      const desktop = document.getElementById('desktop');
      desktop.innerHTML = '';
      for (const app of apps) {
        const tile = document.createElement('div');
        tile.className = 'app-tile';
        tile.innerHTML = `
          <span class="icon">${app.icon || '▣'}</span>
          <div class="name">${app.name}</div>
          <div class="desc">${app.description || ''}</div>
        `;
        tile.addEventListener('click', () => launchApp(app));
        desktop.appendChild(tile);
      }
    }

    const windowLayer = document.getElementById('window-layer');
    const windowFrame = document.getElementById('window-frame');
    const windowTitle = document.getElementById('window-title');
    const settingsPanel = document.getElementById('settings-panel');
    const placeholderPanel = document.getElementById('placeholder-panel');
    const terminalPanel = document.getElementById('terminal-panel');

    function closeWindow() {
      windowLayer.classList.remove('active');
      windowFrame.classList.add('hidden');
      settingsPanel.style.display = 'none';
      placeholderPanel.style.display = 'none';
      terminalPanel.style.display = 'none';
      windowFrame.src = 'about:blank';
    }

    function launchApp(app) {
      windowLayer.classList.add('active');
      windowTitle.textContent = app.name;
      windowFrame.classList.add('hidden');
      settingsPanel.style.display = 'none';
      placeholderPanel.style.display = 'none';
      terminalPanel.style.display = 'none';

      if (app.action === 'settings') {
        settingsPanel.style.display = 'block';
      } else if (app.action === 'terminal') {
        terminalPanel.style.display = 'flex';
        initTerminal();
      } else if (app.action === 'placeholder') {
        placeholderPanel.style.display = 'flex';
        document.getElementById('placeholder-title').textContent = app.name;
        document.getElementById('placeholder-desc').textContent = `${app.description} (not yet wired).`;
      } else if (app.action === 'iframe' && app.url) {
        windowFrame.classList.remove('hidden');
        windowFrame.src = app.url;
      } else {
        placeholderPanel.style.display = 'flex';
      }
    }

    window.addEventListener('message', (e) => {
      if (e.data && e.data.action === 'close-app') closeWindow();
    });

    function initTerminal() {
      const out = document.getElementById('terminal-output');
      const input = document.getElementById('terminal-input');
      if (out.dataset.ready) return;
      out.dataset.ready = '1';
      out.textContent = 'Tsukuyomi OS Terminal v0.1\nType "help" for commands.\n\n';
      input.focus();
      input.onkeydown = async (e) => {
        if (e.key !== 'Enter') return;
        const cmd = input.value.trim();
        if (!cmd) return;
        out.textContent += `$ ${cmd}\n`;
        input.value = '';
        const response = await fetch('/api/terminal', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({cmd})
        });
        const data = await response.json();
        out.textContent += (data.output || data.error || '') + '\n';
        out.scrollTop = out.scrollHeight;
      };
    }

    document.getElementById('btn-close').addEventListener('click', closeWindow);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeWindow(); });

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
    }

    document.getElementById('btn-save-settings').addEventListener('click', () => {
      saveSettings();
      alert('Settings saved locally.');
    });

    loadProfile();
    loadApps();
  </script>
</body>
</html>
