<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tsukuyomi OS</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121821;
      --accent: #00d4ff;
      --text: #e6f1f8;
      --muted: #8b9bb4;
      --error: #ff5a5a;
      --border: #1c2733;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      background: radial-gradient(circle at 50% 20%, #13202e 0%, var(--bg) 60%);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }
    h1 { margin: 0 0 8px; font-size: 1.6rem; }
    p.tagline { color: var(--muted); margin: 0 0 28px; font-size: 0.95rem; }
    input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0b1219;
      color: var(--text);
      font-size: 1rem;
    }
    input:focus {
      outline: 2px solid var(--accent);
      border-color: var(--accent);
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 6px;
    }
    button:hover { filter: brightness(1.1); }
    .error {
      color: var(--error);
      margin-top: 12px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <div class="logo">🛡️</div>
    <h1>Tsukuyomi OS</h1>
    <p class="tagline">Secure cloud desktop</p>
    <form method="POST" action="/login">
      <input type="text" name="username" placeholder="Username" required autofocus autocomplete="username">
      <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
      <button type="submit">Sign In</button>
    </form>
    {% if error %}
    <div class="error">Invalid username or password.</div>
    {% endif %}
  </main>
</body>
</html>
